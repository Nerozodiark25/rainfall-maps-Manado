name: Update Rainfall Maps

on:
  schedule:
    - cron: '0 19,7 * * *'            # Every hour (you can change to '*/30 * * * *' for every 30 min)
  workflow_dispatch:             # Allows manual trigger from GitHub UI

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install folium requests tenacity numpy matplotlib

    - name: Run map generator script
      run: python generate_weather_maps.py

    - name: Commit and push updated files
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add *.html colorbar_*.png || true
        git commit -m "Update rainfall maps - $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
