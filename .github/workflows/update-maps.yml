name: Update Rainfall Maps

on:
  schedule:
    - cron: '7 19,7 * * *'
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install folium requests tenacity numpy matplotlib

    - name: Run map generator script
      env:
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}  
      run: python generate_weather_maps.py

    - name: Commit and push updated files
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add *.html colorbar_*.png || true
        git commit -m "Update rainfall maps - $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
        git push
